version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: io.github.Faugus.faugus-launcher
    name: Faugus Launcher
    icon: io.github.Faugus.faugus-launcher
    version: 1.22.6
    exec: usr/bin/faugus-launcher
    exec_args: "$@"
  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse'
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - gir1.2-gtk-3.0
      - gir1.2-ayatanaappindicator3-0.1
      - python3-requests
      - python3-pil
      - python3-psutil
      - python3-pygame
      - imagemagick
      - libcanberra-gtk3-0
      - canberra-gtk-play
      - vulkan-tools
      - shared-mime-info
      - desktop-file-utils
      - hicolor-icon-theme
      - libglib2.0-bin
    exclude: []
  runtime:
    env:
      PATH: '${APPDIR}/usr/bin:${PATH}'
      PYTHONPATH: '${APPDIR}/usr/lib/python3/dist-packages:${APPDIR}/usr/lib/python3/dist-packages/faugus:${PYTHONPATH}'
      GI_TYPELIB_PATH: '${APPDIR}/usr/lib/girepository-1.0:${APPDIR}/usr/lib/x86_64-linux-gnu/girepository-1.0:${GI_TYPELIB_PATH}'
      XDG_DATA_DIRS: '${APPDIR}/usr/share:${XDG_DATA_DIRS}'

AppImage:
  update-information: guess
  sign-key: None
  arch: x86_64
